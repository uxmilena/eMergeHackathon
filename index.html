<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canon — Policy OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }

    /* ─── VARIABLES ──────────────────────────────────────── */
    :root {
      --red:     #E8221A;
      --black:   #0a0a0a;
      --white:   #fafafa;
      --muted:   #6b6b6b;
      --border:  #e0e0e0;
      --surface: #ffffff;

      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'DM Sans', sans-serif;

      --topbar-h:  56px;
      --sidebar-w: 220px;
    }

    /* ─── BASE ───────────────────────────────────────────── */
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--white);
      color: var(--black);
      font-family: var(--font-body);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── TOPBAR ─────────────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 100;
    }

    .topbar-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .topbar-logo {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--black);
      line-height: 1;
    }

    .topbar-sub {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--muted);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #api-status {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      transition: color 0.25s;
    }

    .topbar-badge {
      background: var(--black);
      color: var(--surface);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      padding: 5px 12px;
    }

    .topbar-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--black);
      flex-shrink: 0;
    }

    /* ─── SIDEBAR ────────────────────────────────────────── */
    #sidebar {
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--topbar-h));
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 50;
    }

    .nav-section {
      padding: 24px 0 8px;
    }

    .nav-section + .nav-section {
      border-top: 1px solid var(--border);
    }

    .nav-section-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--muted);
      padding: 0 20px;
      margin-bottom: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 20px 9px 18px;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      user-select: none;
    }

    .nav-item-left {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .nav-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .nav-item:hover {
      background: var(--white);
      color: var(--black);
    }

    .nav-item:hover .nav-dot {
      background: var(--muted);
    }

    .nav-item.active {
      border-left-color: var(--red);
      background: #fff5f5;
      color: var(--red);
      font-weight: 500;
    }

    .nav-item.active .nav-dot {
      background: var(--red);
    }

    .nav-badge {
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 500;
      line-height: 1;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    .sidebar-user {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-user-info {
      display: flex;
      flex-direction: column;
    }

    .sidebar-user-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--black);
      line-height: 1.3;
    }

    .sidebar-user-role {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ─── MAIN ───────────────────────────────────────────── */
    #main {
      position: fixed;
      top: var(--topbar-h);
      left: var(--sidebar-w);
      right: 0;
      bottom: 0;
      overflow-y: auto;
      background: var(--white);
      padding: 48px 52px;
    }

    #main-content {
      color: var(--muted);
      font-size: 13px;
    }

    /* ─── SCROLLBAR ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c8c8c8; }
  </style>
</head>
<body>

  <!-- ── TOPBAR ──────────────────────────────────────────── -->
  <header id="topbar">
    <div class="topbar-brand">
      <span class="topbar-logo">CANON</span>
      <span class="topbar-sub">Policy OS</span>
    </div>
    <div class="topbar-right">
      <span id="api-status">● CHECKING...</span>
      <span class="topbar-badge">HR Manager</span>
      <div class="topbar-avatar">SR</div>
    </div>
  </header>

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <nav id="sidebar">

    <div class="nav-section">
      <div class="nav-section-label">Workspace</div>
      <div class="nav-item active" data-screen="dashboard" onclick="showScreen('dashboard')">
        <div class="nav-item-left">
          <span class="nav-dot"></span>
          Dashboard
        </div>
      </div>
      <div class="nav-item" data-screen="documents" onclick="showScreen('documents')">
        <div class="nav-item-left">
          <span class="nav-dot"></span>
          Documents
        </div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Policies</div>
      <div class="nav-item" data-screen="open-policies" onclick="showScreen('open-policies')">
        <div class="nav-item-left">
          <span class="nav-dot"></span>
          Open Policies
        </div>
        <span class="nav-badge">2</span>
      </div>
      <div class="nav-item" data-screen="approvals" onclick="showScreen('approvals')">
        <div class="nav-item-left">
          <span class="nav-dot"></span>
          Approvals
        </div>
        <span class="nav-badge">2</span>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Publish</div>
      <div class="nav-item" data-screen="generate" onclick="showScreen('generate')">
        <div class="nav-item-left">
          <span class="nav-dot"></span>
          Generate
        </div>
      </div>
      <div class="nav-item" data-screen="version-log" onclick="showScreen('version-log')">
        <div class="nav-item-left">
          <span class="nav-dot"></span>
          Version Log
        </div>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="topbar-avatar" style="width:30px;height:30px;font-size:10px;">SR</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">Sara R.</div>
        <div class="sidebar-user-role">HR Manager</div>
      </div>
    </div>

  </nav>

  <!-- ── MAIN ────────────────────────────────────────────── -->
  <main id="main">
    <div id="main-content">
      <p>Screens go here</p>
    </div>
  </main>

  <script>
    // ── SCREEN SWITCHING ──────────────────────────────────
    function showScreen(id) {
      console.log('showScreen:', id);
      document.querySelectorAll('.nav-item[data-screen]').forEach(item => {
        item.classList.toggle('active', item.dataset.screen === id);
      });
    }

    // ── API STATUS ────────────────────────────────────────
    (async function checkAPI() {
      const el = document.getElementById('api-status');
      try {
        const res = await fetch('https://emergehackathon.onrender.com/', {
          signal: AbortSignal.timeout(5000)
        });
        if (res.ok) {
          el.textContent = '● LIVE';
          el.style.color = '#27ae60';
        } else {
          throw new Error();
        }
      } catch {
        el.textContent = '● OFFLINE';
        el.style.color = '#E8221A';
      }
    })();
  </script>

</body>
</html>
